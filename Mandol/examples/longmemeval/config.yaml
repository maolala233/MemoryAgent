# LongMemEval example configuration file
# Configuration priority: .env environment variables > config.yaml > code defaults

llm:
  model: "gpt-4o-mini"
  base_url: "https://api.openai.com/v1"

embedder:
  model: "Qwen/Qwen3-Embedding-4B"
  device: "cpu"
  dimension: 2560
  use_remote: false

reranker:
  model: "Qwen/Qwen3-Reranker-4B"
  device: "cpu"
  use_remote: false

storage:
  root: null
  enable_persistence: false
  auto_save_interval: 300

system:
  chunk_max_tokens: 512
  session_time_gap_seconds: 1800
  session_check_interval: 20
  session_max_pending: 100
  similarity_top_k: 5
  similarity_threshold: 0.7
  similarity_recent_window: 20
  bfs_expansion_per_seed: 3
  bfs_expansion_hops: 1
  max_context_units: 20
  max_entities_per_llm: 50
  max_events_per_llm: 50
  promote_threshold: 100
