# AMS Memory System Configuration
# This file configures the memory system components.
# Configuration priority: .env environment variables > config.yaml > code defaults
# 
# Usage:
#   - Put sensitive info (API keys, tokens) in .env file
#   - Put non-sensitive config (model names, devices, thresholds) in this file
#   - Environment variables in .env will override values in this file

# LLM Configuration (OpenAI-compatible API)
llm:
  # API key should be set via OPENAI_API_KEY environment variable in .env
  # api_key: ""  # Don't put API keys here, use .env instead
  base_url: "https://api.openai.com/v1"  # Can be overridden by OPENAI_API_BASE env var
  model: "gpt-4o-mini"

# Embedding Configuration
embedder:
  # Local mode (default): uses sentence-transformers
  model: "Qwen/Qwen3-Embedding-4B"
  device: "cpu"  # "cpu" or "cuda"
  dimension: 2560

  # Remote mode: set use_remote to true and configure base_url
  use_remote: false  # Set true to use remote embedder service
  # base_url: "http://localhost:8000/v1"  # Remote embedder base URL
  # api_path: "/embeddings"  # API path for embeddings
  # api_key: ""  # Should be set via MANDOL_EMBEDDER_API_KEY env var in .env
  # timeout: 30  # Request timeout in seconds

# Reranker Configuration
reranker:
  # Local mode: uses sentence-transformers CrossEncoder
  model: "Qwen/Qwen3-Reranker-4B"
  device: "cpu"  # "cpu" or "cuda"

  # Remote mode: set use_remote to true and configure base_url
  use_remote: false  # Set true to use remote reranker service
  # base_url: "https://your-reranker-api-endpoint.com"  # Remote reranker base URL
  # api_path: "/v1/rerank"  # API path for reranking
  # api_key: ""  # Should be set via MANDOL_RERANKER_API_KEY env var in .env
  # timeout: 30  # Request timeout in seconds

# Storage Configuration
storage:
  root: null  # Path for persistence (e.g., "./data/memory")
  enable_persistence: false
  auto_save_interval: 300  # seconds

# System Configuration
system:
  chunk_max_tokens: 512
  session_time_gap_seconds: 1800  # 30 minutes
  session_check_interval: 20
  session_max_pending: 100
  similarity_top_k: 5
  similarity_threshold: 0.7
  similarity_recent_window: 20
  bfs_expansion_per_seed: 3
  bfs_expansion_hops: 1
  max_context_units: 20
  max_entities_per_llm: 50
  max_events_per_llm: 50
  promote_threshold: 100  # FAISS/BM25/TF-IDF index promotion threshold
