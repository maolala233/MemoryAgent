<svg width="32" height="32" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Base layer circles -->
  <circle cx="50" cy="148" r="10" fill="url(#lg)" opacity="0.55"/>
  <circle cx="100" cy="152" r="10" fill="url(#lg)" opacity="0.65"/>
  <circle cx="150" cy="148" r="10" fill="url(#lg)" opacity="0.55"/>
  <!-- Mid layer -->
  <circle cx="65" cy="108" r="14" fill="none" stroke="url(#lg)" stroke-width="3.5" opacity="0.75"/>
  <circle cx="135" cy="108" r="14" fill="none" stroke="url(#lg)" stroke-width="3.5" opacity="0.75"/>
  <!-- Connections mid-base -->
  <line x1="50" y1="138" x2="65" y2="122" stroke="#6366f1" stroke-width="2" opacity="0.35" stroke-dasharray="4 3"/>
  <line x1="100" y1="142" x2="100" y2="108" stroke="#6366f1" stroke-width="2" opacity="0.35" stroke-dasharray="4 3"/>
  <line x1="150" y1="138" x2="135" y2="122" stroke="#6366f1" stroke-width="2" opacity="0.35" stroke-dasharray="4 3"/>
  <!-- Top layer -->
  <circle cx="100" cy="64" r="18" fill="none" stroke="url(#lg)" stroke-width="4"/>
  <circle cx="100" cy="64" r="5" fill="url(#lg)"/>
  <!-- Connections top-mid -->
  <line x1="82" y1="64" x2="60" y2="42" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="100" y1="46" x2="100" y2="30" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="118" y1="64" x2="140" y2="42" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Top circles -->
  <circle cx="60" cy="38" r="4" fill="#60a5fa" opacity="0.8"/>
  <circle cx="100" cy="24" r="4" fill="#06b6d4" opacity="0.8"/>
  <circle cx="140" cy="38" r="4" fill="#a78bfa" opacity="0.8"/>
</svg>
