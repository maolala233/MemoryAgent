# Retrieval / search configuration
default_strategy: hybrid

strategies:
  keyword:
    enabled: true
    fts_table: memory_fts
    limit: 30
  semantic:
    enabled: true
    top_k: 30
    min_score: 0.10  # 之前 0.15,降为 0.10 提升召回
  hybrid:
    enabled: true
    keyword_weight: 0.4  # 之前 0.55,降为 0.4 提升语义权重
    semantic_weight: 0.6
    limit: 30

cache:
  enabled: true
  ttl_seconds: 300

filters:
  tracks:
    - project
    - workflow
    - decision
    - note
    - reference
  memory_types:
    - project
    - workflow
    - decision
    - note
    - reference
    - imported_document
  statuses:
    - active
    - verified
    - stale
    - deleted
